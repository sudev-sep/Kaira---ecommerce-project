
<app-header></app-header>

<div class="container mt-4 d-flex justify-content-center">
  <h2 class="mb-4 text-center">
    Welcome, {{ customer.first_name }} {{ customer.last_name }}
  </h2><br><br>
   <div class="p-4 border rounded shadow-sm bg-light w-50">
  <p><strong>Username:</strong> {{ customer.username }}</p><br>
  <p><strong>Email:</strong> {{ customer.email }}</p><br><br>
  <p><strong>Phone:</strong> {{ customer.phone_number }}</p><br><br>
  <p><strong>Address:</strong> {{ customer.address }}</p><br><br>
  </div>

</div>

<form
  (ngSubmit)="updateProfile()"
  #editForm="ngForm"
  class="container mt-4 p-4 border rounded shadow-sm bg-light">
  <h3 class="mb-4 text-center text-dark">Edit Profile</h3>

  <div class="mb-3">
    <label class="form-label text-black">First Name</label>
    <input type="text"
           class="form-control"
           [(ngModel)]="customer.first_name"
           name="first_name">
  </div>

  <div class="mb-3">
    <label class="form-label text-black">Username</label>
    <input type="text"
           class="form-control"
           [(ngModel)]="customer.username"
           name="username">
  </div>

  <div class="mb-3">
    <label class="form-label text-black">Last Name</label>
    <input type="text"
           class="form-control"
           [(ngModel)]="customer.last_name"
           name="last_name">
  </div>

  <div class="mb-3">
    <label class="form-label text-black">Email</label>
    <input type="email"
           class="form-control"
           [(ngModel)]="customer.email"
           name="email">
  </div>

  <div class="mb-3">
    <label class="form-label text-black">Phone</label>
    <input type="text"
           class="form-control"
           [(ngModel)]="customer.phone_number"
           name="phone_number">
  </div>

  <div class="mb-3">
    <label class="form-label text-black">Address</label>
    <input type="text"
           class="form-control"
           [(ngModel)]="customer.address"
           name="address">
  </div>

  <button type="submit" class="btn btn-success w-100">Update</button>
</form>


<app-footer></app-footer>
