<app-header></app-header>

<section class="container my-5">
  <div class="row justify-content-center">

    <div class="col-lg-10">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="row g-0">

          <div class="col-md-4 register-side text-white text-center p-4">
            <div class="profile-avatar">
             <i class="bi bi-person-circle"></i>
            </div>
            <h5 class="mt-3">Create Account</h5>
            <p class="small opacity-75">
              Join us and start shopping smarter
            </p>
          </div>

          <div class="col-md-8 p-4">
            <h4 class="mb-4">Customer Registration</h4>

            <form #registerForm="ngForm"
                  (ngSubmit)="onregister(registerForm)">

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">First Name</label>
                  <input type="text" class="form-control"
                         name="first_name" required
                         [(ngModel)]="customer.first_name">
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Last Name</label>
                  <input type="text" class="form-control"
                         name="last_name" required
                         [(ngModel)]="customer.last_name">
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Username</label>
                  <input type="text" class="form-control"
                         name="username" required
                         [(ngModel)]="customer.username">
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control"
                         name="email" required
                         [(ngModel)]="customer.email">
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Password</label>
                  <input type="password" class="form-control"
                         name="password" required
                         [(ngModel)]="customer.password">
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Phone Number</label>
                  <input type="text" class="form-control"
                         name="phone" required
                         [(ngModel)]="customer.phone">
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Address</label>
                <input type="text" class="form-control"
                       name="address" required
                       [(ngModel)]="customer.address">
              </div>

              <button type="submit"
                      class="btn btn-dark w-100 rounded-pill">
                Create Account
              </button>

            </form>
          </div>

        </div>
      </div>
    </div>

  </div>
</section>

<app-footer></app-footer>
