
<app-header></app-header>
<div class="container mt-5 login-card" style="max-width: 700px;">
  <h2 class="mb-4 text-center">customer Registration</h2>
  <form #registerForm="ngForm" (ngSubmit)="onregister(registerForm)" >
    <div class="mb-3">
      <label for="firstname" class="form-label">First Name</label>
      <input type="text" id="firstname" name="first_name" class="form-control" required [(ngModel)]="customer.first_name">
    </div>
    <div class="mb-3">
      <label for="lastname" class="form-label">Last Name</label>
      <input type="text" id="lastname" name="last_name" class="form-control" required [(ngModel)]="customer.last_name">
    </div>
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" id="username" name="username" class="form-control" required [(ngModel)]="customer.username">
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" id="email" name="email" class="form-control" required [(ngModel)]="customer.email">
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" name="password" class="form-control" required [(ngModel)]="customer.password">
    </div>
    <div class="mb-3">
      <label for="address" class="form-label">Address</label>
      <input type="text" id="address" name="address" class="form-control" required [(ngModel)]="customer.address">
    </div>
    <div class="mb-3">
      <label for="phone" class="form-label">Phone Number</label>
      <input type="text" id="phone" name="phone" class="form-control" required [(ngModel)]="customer.phone">
    </div>
  
    <button type="submit" class="btn btn-primary w-100 rounded ">Register</button>
  </form>
</div>

<app-footer></app-footer>
