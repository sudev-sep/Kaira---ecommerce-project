<app-header></app-header>

<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">

      <div class="edit-profile-card">

        <h3 class="text-center mb-4">Add Seller</h3>

        <form #sellerForm="ngForm" (ngSubmit)="submit(sellerForm)">

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Username</label>
              <input class="form-control"
                     [(ngModel)]="seller.username"
                     name="username"
                     required>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Email</label>
              <input type="email"
                     class="form-control"
                     [(ngModel)]="seller.email"
                     name="email">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input class="form-control"
                     [(ngModel)]="seller.first_name"
                     name="first_name">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name</label>
              <input class="form-control"
                     [(ngModel)]="seller.last_name"
                     name="last_name">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Shop Name</label>
              <input class="form-control"
                     [(ngModel)]="seller.shop_name"
                     name="shop_name">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">GST Number</label>
              <input class="form-control"
                     [(ngModel)]="seller.gst_number"
                     name="gst_number">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Phone Number</label>
              <input class="form-control"
                     [(ngModel)]="seller.phone_number"
                     name="phone_number">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Password</label>
              <input type="password"
                     class="form-control"
                     [(ngModel)]="seller.password"
                     name="password"
                     required>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <button class="btn btn-secondary rounded"
                    type="button"
                    (click)="cancel()">
              Cancel
            </button>
            <button class="btn btn-primary rounded"
                    type="submit">
              Create Seller
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
